# Build configuration for the deployable Stylus wasm.
#
# The deployable artifact is produced by the cargo-stylus 0.10.7 managed/verify flow,
# which itself injects the build-std + panic-immediate-abort settings that strip the
# panic machinery the wasm cannot use (Stylus reverts on trap) so the binary fits the
# on-chain activation size limit. This file only adds the reproducibility flag below;
# keeping build-std out of here leaves host builds (cargo test) on the default std.
#
# - location-detail=none: drop panic file/line/path metadata — no local paths leak into
#   the artifact, and the build is insensitive to comment/line shifts.
#
# To reproduce the deployable wasm without cargo-stylus, add the managed flags explicitly:
#   cargo build --release --target wasm32-unknown-unknown -p denaria-perp-engine-stylus \
#     -Z build-std=std,panic_abort -Z build-std-features=panic_immediate_abort

[target.wasm32-unknown-unknown]
rustflags = ["-Zlocation-detail=none"]
