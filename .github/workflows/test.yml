name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    strategy:
      fail-fast: true

    name: Foundry project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Show Forge version
        run: |
          forge --version

      - name: Run Forge fmt
        run: |
          forge fmt --check
        id: fmt

      - name: Run Forge build
        # Size-gate the DEPLOYABLE contracts only. The differential-test reference contracts
        # under test/ inherit the full Solidity PerpPair plus fixture-generation helpers, so
        # they run over EIP-170; they are never deployed (Foundry deploys them for tests
        # regardless of size). src/ still covers every real deployable, including PerpPair.
        run: |
          forge build --sizes --skip 'test/**'
        id: build

      - name: Run Forge tests
        run: |
          forge test -vvv
        id: test

      # Cross-contract selector-dependency audit (2026-06-10): every typed callback
      # in the deployed Solidity stack must exist on the Stylus engine #[public]
      # surface (and Vault/oracle ABIs), with matching return shapes — the bug class
      # that shipped the 2026-06-08 deploy with every UtilMath read path reverting.
      # Uses forge inspect + cast (already installed by foundry-toolchain).
      - name: Selector-dependency audit (Solidity <-> Stylus surfaces)
        run: |
          python3 script/selector_dependency_audit.py
        id: selector_audit

      # The deployed contract is the Rust/WASM PerpEngine, but CI previously ran only the
      # Foundry suite — the engine and curve-math crates (the real deployed logic, with their
      # unit/differential/golden-vector tests) were ungated. rust-toolchain.toml pins the
      # toolchain (auto-installed on first cargo call). `stub_boundary` mocks the oracle
      # boundary so the oracle-path tests (trade/close/liquidation/funding) execute; without
      # it they compile out.
      - name: Run Rust engine + curve-math tests
        run: |
          rustc --version
          cargo test -p denaria-curve-math-stylus
          cargo test -p denaria-perp-engine-stylus --features stub_boundary
        id: rust_test
