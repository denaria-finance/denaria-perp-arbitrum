[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.30"
ffi = true
via-ir = true
optimizer = true
optimizer_runs = 1
gas_limit = "18446744073709551615"
fs_permissions = [{ access = "read-write", path = "./test/fixtures" }]

[fmt] # See https://book.getfoundry.sh/reference/config/formatter
int_types = "long"
line_length = 120
bracket_spacing = true
multiline_func_header = "all"
number_underscore = "thousands"
quote_style = "double"
ignore = ['./script/**/*']



[profile.default.optimizer_details]
yul = true

[profile.default.optimizer_details.yulDetails]
optimizerSteps = 'dhfoDgvulfnTUtnIf[xa[r]EscLMcCTUtTOntnfDIulLculVcul[j]Tpeulxa[rul]xa[r]cLgvifCTUca[r]LSsTOtfDnca[r]Iulc]jmul[jul]VcTOculjmul'

[fuzz]
runs = 256

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
